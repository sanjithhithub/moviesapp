services:
  - type: web
    name: moviepage
    env: python
    plan: free

    buildCommand: "./build.sh"
    startCommand: "gunicorn moviepage.wsgi:application --bind 0.0.0.0:$PORT"

    envVars:
      - key: DATABASE_URL
        sync: false

      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        value: ".onrender.com"

      - key: PYTHON_VERSION
        value: "3.11"